<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FinNLP - Company Comparison</title>

<style>

*{
box-sizing:border-box;
font-family:'Segoe UI', Tahoma, sans-serif;
}

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#0f172a,#1f2937);
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

.container{
width:750px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(14px);
border-radius:18px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

h2{
text-align:center;
margin-bottom:20px;
}

.select-row{
display:flex;
gap:15px;
}

select{
width:100%;
padding:12px;
border-radius:8px;
border:none;
font-size:15px;
margin-top:10px;
}

button{
display:block;
margin:20px auto;
padding:12px 25px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.result{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
margin-top:25px;
}

.company-box{
background:rgba(255,255,255,0.07);
padding:20px;
border-radius:12px;
text-align:center;
}

.ai-insight{
margin-top:25px;
padding:18px;
border-radius:12px;
background:rgba(59,130,246,0.15);
border:1px solid rgba(59,130,246,0.4);
font-size:15px;
line-height:1.6;
}

.ai-insight-title{
font-weight:bold;
font-size:16px;
margin-bottom:8px;
color:#60a5fa;
}

.circle{
width:130px;
height:130px;
border-radius:50%;
margin:15px auto;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
background:conic-gradient(#22c55e 0deg,#334155 0deg);
position:relative;
}

.circle::after{
content:"";
position:absolute;
width:95px;
height:95px;
background:#0f172a;
border-radius:50%;
}

.score{
position:relative;
z-index:2;
}

.stats{
margin-top:15px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.card{
background:rgba(255,255,255,0.08);
padding:8px;
border-radius:8px;
font-size:14px;
}

.card span{
display:block;
font-size:18px;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<h2>Compare Company Sentiment</h2>

<div class="select-row">
<select id="company1"></select>
<select id="company2"></select>
</div>

<button onclick="compare()">Compare</button>

<div id="result" class="result"></div>

<div class="footer">
FinBERT Comparison Engine
</div>

</div>


<script>

let companies=[]

window.onload=function(){

fetch("http://localhost:8080/api/companies")
.then(res=>res.json())
.then(data=>{
companies=data
populate(data)
})

}

function populate(list){

const c1=document.getElementById("company1")
const c2=document.getElementById("company2")

list.forEach(c=>{

let opt1=document.createElement("option")
opt1.value=c.symbol
opt1.text=c.name+" ("+c.symbol+")"

let opt2=opt1.cloneNode(true)

c1.appendChild(opt1)
c2.appendChild(opt2)

})

}

function compare(){

let s1=document.getElementById("company1").value
let s2=document.getElementById("company2").value

document.getElementById("result").innerHTML="Loading..."

fetch(`http://localhost:8080/api/compare?symbol1=${s1}&symbol2=${s2}`)
.then(res=>res.json())
.then(data=>showResult(s1,s2,data))

}

function showResult(s1,s2,data){

let c1=data.company1
let c2=data.company2
let insight=data.ai_insight

let score1=Math.round((c1.sentiment_score+1)*50)
let score2=Math.round((c2.sentiment_score+1)*50)

document.getElementById("result").innerHTML=

`

<div class="company-box">

<h3>${s1}</h3>

<div class="circle" id="c1">
<div class="score">${score1}%</div>
</div>

<div class="stats">
<div class="card">Positive<span>${c1.positive}</span></div>
<div class="card">Neutral<span>${c1.neutral}</span></div>
<div class="card">Negative<span>${c1.negative}</span></div>
</div>

</div>


<div class="company-box">

<h3>${s2}</h3>

<div class="circle" id="c2">
<div class="score">${score2}%</div>
</div>

<div class="stats">
<div class="card">Positive<span>${c2.positive}</span></div>
<div class="card">Neutral<span>${c2.neutral}</span></div>
<div class="card">Negative<span>${c2.negative}</span></div>
</div>

</div>

<div class="ai-insight">
<div class="ai-insight-title">AI Comparative Insight</div>
${insight}
</div>

`

/* Animate circular charts */

let circle1=document.getElementById("c1")
let circle2=document.getElementById("c2")

circle1.style.background=
`conic-gradient(#22c55e ${score1*3.6}deg,#334155 0deg)`

circle2.style.background=
`conic-gradient(#22c55e ${score2*3.6}deg,#334155 0deg)`

}

</script>

</body>
</html>
